Name: user-api
Host: 0.0.0.0
Port: 8888

Register:
  SendCodeConfig:
    ReceiveType: "register"
    ExpireIn: 300
    RetryAfter: 60
    RedisKeyPrefix: "account"
    ReminderType:
      Registered: "reminder_registered"

KqConsumerConf:
  Name: kqConsumer
  Brokers:
    - localhost:9092
  Group: kqConsumer
  Topic: my-topic
  Offset: first
  Consumers: 1
  Processors: 1

KqPusherConf:
  Brokers:
    - localhost:9092
  Topic: my-topic

SmtpConfig:
  Host: localhost
  Port: 1025
  Username: ""
  Password: ""
  From: noreply@test.com

RedisConfig:
  Host: "localhost:6379"
  Type: node
  Tls: false
  NonBlock: true
  PingTimeout: 1s

PostgreSQL:
  datasource: "postgres://username:123456@127.0.0.1:5432/user_db?sslmode=disable"
CacheRedis:
  - Host: 127.0.0.1:6379
    Type: node
    Pass: ""