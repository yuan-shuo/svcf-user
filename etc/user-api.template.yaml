Name: user-api
Host: 0.0.0.0
Port: 8888

# JWT 认证配置
Auth:

  # Access Token 签名密钥，用于签发和验证短期令牌
  AccessSecret: "yourATsecret"

  # Access Token 有效期，单位：秒
  AccessExpire: 86400

# Refresh Token 签名密钥，用于在 Access Token 过期后获取新的 Access Token
RefreshSecret: "yourRTsecret"

# Refresh Token 有效期，单位：秒
RefreshExpire: 604800

# postgreSQL数据库配置
PostgreSQL:

  # 数据库链接
  Datasource: "postgres://username:123456@127.0.0.1:5432/user_db?sslmode=disable"

  # 连接池配置（可选，不想配置就跳过这个配置字段，程序会自行使用默认值）
  Pool:

    # 最大打开连接数，默认64
    # 作用：限制并发连接数，避免数据库被大量请求压垮
    MaxOpenConns: 64

    # 最大空闲连接数，默认64
    # 当一个连接使用完成后，会存到空闲连接池，等待被再次使用
    # 作用：保持空闲连接，避免频繁创建销毁带来的开销
    MaxIdleConns: 64

    # 连接最大生命周期(秒)，默认3600秒(1小时)
    # 一个连接从创建开始能存活的最长时间，到期后会被关闭并重建
    # 作用：防止连接长期不刷新导致的问题（如防火墙超时、数据库端连接超时）
    ConnMaxLifetime: 3600

    # 连接最大空闲时间(秒)，默认600秒(10分钟)
    # 超过此时间的空闲连接会被关闭
    # 作用：及时释放不用的连接，减少资源占用
    ConnMaxIdleTime: 600

# 邮件发送服务配置
SmtpConfig:

  # SMTP服务地址
  Host: localhost
  Port: 1025

  # SMTP服务用户名及密码
  Username: ""
  Password: ""

  # 发件人邮箱
  From: noreply@test.com

# --- 以下配置，如果是用容器跑的，不太需要有改动了 ---

# kafka消费者配置
KqConsumerConf:

  # 服务名，跟kq.KqConf没关系，service.ServiceConf要求的字段，不写会跑不起来消费者
  Name: kqConsumerSendEmail

  # (复用) kafka节点地址，生产者配置复用此值保持绝对一致
  Brokers:
    - localhost:9092

  # 消费者组
  Group: kqConsumerSendEmail

  # (复用) 消费者主题，生产者配置复用此值保持绝对一致
  Topic: user-sendmail-topic

  # 消费者起始偏移量设置
  # first: 从最早可用消息开始消费
  # last: 从最新消息开始消费
  # 时间戳: 从指定时间点之后的消息开始消费（如 2024-01-01T00:00:00）
  Offset: first

  # 消费者实例数量
  Consumers: 1

  # 消息处理器线程数
  Processors: 1

# 业务redis数据库配置
RedisConfig:

  # redis数据库地址
  Host: localhost:6379

  # 其他可选参数
  Type: node
  Tls: false
  NonBlock: true
  PingTimeout: 1s

# postgreSQL查询缓存redis配置
CacheRedis:
  - Host: localhost:6379
    Type: node
    Pass: ""

# 验证码配置
VerifyCodeConfig:

  # 验证码类型
  Type:
    Register: register # 注册验证码
    ResetPassword: reset_password # 重置密码验证码
    ChangePassword: change_password # 修改密码验证码
    RemindRegistered: remind_registered # 提醒注册验证码

  # 验证码时间相关配置参数
  Time:
    ExpireIn: 300 # 验证码有效期时间，单位：秒
    RetryAfter: 60 # 验证码请求间隔时间，单位：秒

  # 验证码redis数据库配置
  Redis:
    KeyPrefix: account # 验证码redis数据库键的前缀

# prometheus 配置
Prometheus:
  Host: 0.0.0.0
  Port: 9101
  Path: /metrics

# gozero 组件配置

# CPU 使用率 — 每 250 ms 采样一次，超过阈值（默认 90%）时激活降载
# 90%，单位为毫核×10（0-1000）
CpuThreshold: 900

# 超过此时间的请求会自动收到 HTTP 408 响应
# 毫秒（默认值：3000）
Timeout: 3000

