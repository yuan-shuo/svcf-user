Name: user-api
Host: 0.0.0.0
Port: 8888

Register:
  SendCodeConfig:
    ReciveType: "register"
    ExpireIn: 600
    RetryAfter: 60

KqConsumerConf:
  Name: kqConsumer
  Brokers:
    - localhost:9092
  Group: kqConsumer
  Topic: my-topic
  Offset: first
  Consumers: 1
  Processors: 1

KqPusherConf:
  Brokers:
    - localhost:9092
  Topic: my-topic
