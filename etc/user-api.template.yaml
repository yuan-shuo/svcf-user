Name: user-api
Host: 0.0.0.0
Port: 8888

# JWT 认证配置
Auth:

  # Access Token 签名密钥，用于签发和验证短期令牌
  AccessSecret: "yourATsecret"

  # Access Token 有效期，单位：秒
  AccessExpire: 86400

# Refresh Token 签名密钥，用于在 Access Token 过期后获取新的 Access Token
RefreshSecret: "yourRTsecret"

# Refresh Token 有效期，单位：秒
RefreshExpire: 604800

# postgreSQL数据库配置
PostgreSQL:

  # 数据库链接
  Datasource: "postgres://username:123456@127.0.0.1:5432/user_db?sslmode=disable"

# 邮件发送服务配置
SmtpConfig:

  # SMTP服务地址
  Host: localhost
  Port: 1025

  # SMTP服务用户名及密码
  Username: ""
  Password: ""

  # 发件人邮箱
  From: noreply@test.com

# --- 以下配置，如果是用容器跑的，不太需要有改动了 ---

# kafka消费者配置
KqConsumerConf:

  # 服务名，跟kq.KqConf没关系，service.ServiceConf要求的字段，不写会跑不起来消费者
  Name: kqConsumerSendEmail

  # (复用) kafka节点地址，生产者配置复用此值保持绝对一致
  Brokers:
    - localhost:9092

  # 消费者组
  Group: kqConsumerSendEmail

  # (复用) 消费者主题，生产者配置复用此值保持绝对一致
  Topic: user-sendmail-topic

  # 消费者起始偏移量设置
  # first: 从最早可用消息开始消费
  # last: 从最新消息开始消费
  # 时间戳: 从指定时间点之后的消息开始消费（如 2024-01-01T00:00:00）
  Offset: first

  # 消费者实例数量
  Consumers: 1

  # 消息处理器线程数
  Processors: 1

# 业务redis数据库配置
RedisConfig:

  # redis数据库地址
  Host: localhost:6379

  # 其他可选参数
  Type: node
  Tls: false
  NonBlock: true
  PingTimeout: 1s

# postgreSQL查询缓存redis配置
CacheRedis:
  - Host: localhost:6379
    Type: node
    Pass: ""

# 注册配置
Register:

  # 验证码发送配置，可以放着不管不改也不会有事，不关心可以跳过整个字段
  SendCodeConfig:

    # 注册验证码类型，用于redis存储hash验证码和消息队列的类型字段
    ReceiveType: register

    # 注册码有效时间，超过此时间就会被redis清理，单位：s
    ExpireIn: 300

    # 注册码请求间隔时间，防止频繁请求，单位：s
    RetryAfter: 60

    # redis数据库存储注册验证码使用的键的前缀
    RedisKeyPrefix: account

    # 邮件提示验证码类型
    ReminderType:
      # 用于提示消息队列的对应消息应用于发送已注册邮箱邮件
      Registered: reminder_registered


