service_name: "user-api"
subsystems:
  - name: "account"
    counters:
      - name: "password_changes_total"
        help: "密码修改次数（需登录）"
        labels: ["result"]
        methods: ["inc"]

  - name: "account_noauth"
    counters:
      - name: "logins_total"
        help: "用户登录次数"
        labels: ["result"]
        methods: ["inc"]
      - name: "registrations_total"
        help: "用户注册次数"
        labels: ["result"]
        methods: ["inc"]
      - name: "password_resets_total"
        help: "密码重置次数（找回密码，无需登录）"
        labels: ["result"]
        methods: ["inc"]
      - name: "token_refreshes_total"
        help: "Token 刷新次数"
        labels: ["result"]
        methods: ["inc"]

  - name: "verifycode"
    counters:
      - name: "codes_sent_total"
        help: "验证码发送次数"
        labels: ["purpose", "result"]
        methods: ["inc"]
      - name: "code_verifications_total"
        help: "验证码验证次数"
        labels: ["purpose", "result"]
        methods: ["inc"]
      - name: "rate_limit_hits_total"
        help: "验证码限流触发次数"
        labels: ["purpose"]
        methods: ["inc"]
